<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Order summary card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="main-wrapper">
      <header class="blue-header-picture">
      <img src="./images/illustration-hero.svg" alt="">
      </header>
      <section class="main-text-section">
      <h1>Order Summary</h1>

      <p>You can now listen to millions of songs, audiobooks, and podcasts on any 
      device anywhere you like!</p>
      </section>
      <section class="main-purchase-section">
        <img class="music-icon" src="./images/icon-music.svg" alt="music-icon">
        <div class="mini-wrapper-price">
          <h2 class="plan-option">Annual Plan</h2>
          <p class="price">$59.99/year</p>
        </div>
        <a class="change-option" href="#">Change</a> 
      </section>
    <footer>
     <button class="cta-button"> Proceed to Payment</button>
     <a class="cancel-order-link" href="#">Cancel Order</a> 
    </footer>
      <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
        Coded by <a href="https://github.com/starzje" target="_blank">Ivan Starčević</a>.
      </div>
</div>
</body>
</html>
